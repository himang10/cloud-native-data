---
# Producer Service
# - nginx frontend의 proxy_pass(http://outbox-producer/api/)가 ClusterIP로 도달
# - 외부 접근이 필요한 경우 type을 LoadBalancer 또는 NodePort로 변경
apiVersion: v1
kind: Service
metadata:
  name: outbox-producer
  namespace: kafka
  labels:
    app: outbox-producer
    component: producer
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: outbox-producer
