apiVersion: v1
kind: Service
metadata:
  name: sk199-outbox-frontend
  namespace: kafka
spec:
  selector:
    app: sk199-outbox-frontend
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 80
    - name: mgmt
      protocol: TCP
      port: 8081
      targetPort: 8081
  type: ClusterIP
