---
# Outbox 이벤트 조회용 토픽 (선택사항)
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: outbox.user
  namespace: kafka
  labels:
    strimzi.io/cluster: my-kafka-cluster
spec:
  partitions: 3
  replicas: 1
  config:
    retention.ms: 604800000  # 7일
    segment.bytes: 1073741824  # 1GB
    cleanup.policy: delete

