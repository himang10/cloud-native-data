apiVersion: v1
kind: Pod
metadata:
  name: kafka-client
  namespace: kafka
spec:
  containers:
  - name: kafka-client
    image: confluentinc/cp-kafka:7.4.0
    command:
      - /bin/bash
      - -c
      - |
        echo "Kafka 클라이언트가 준비되었습니다."
        echo "사용 가능한 명령어:"
        echo "1. 토픽 목록 확인: kafka-topics --bootstrap-server my-kafka-cluster-kafka-external-bootstrap:9094 --list"
        echo "2. 메시지 전송: kafka-console-producer --bootstrap-server my-kafka-cluster-kafka-external-bootstrap:9094 --topic my-topic"
        echo "3. 메시지 수신: kafka-console-consumer --bootstrap-server my-kafka-cluster-kafka-external-bootstrap:9094 --topic my-topic --from-beginning"
        echo "4. 외부 접속 테스트를 위해 다음 명령어를 실행하세요:"
        echo "   kubectl exec -it kafka-client -n kafka -- kafka-topics --bootstrap-server my-kafka-cluster-kafka-external-bootstrap:9094 --list"
        sleep infinity
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "200m"
