apiVersion: kafka.strimzi.io/v1
kind: KafkaConnect
metadata:
  name: debezium-source-connect
  namespace: kafka
  annotations:
    strimzi.io/use-connector-resources: "true"

spec:
  # ==========================================
  # 기본 설정
  # ==========================================
  replicas: 1
  bootstrapServers: my-kafka-cluster-kafka-bootstrap:9092
  image: amdp-registry.skala-ai.com/library/skala-kafka-connect:debezium-3.2.3-kafka-4.0
  version: 4.0.0

  # ==========================================
  # v1 API 필수 필드 (v1beta2에서는 config 하위였음)
  # ==========================================
  groupId: source-connect-cluster
  configStorageTopic: source-connect-configs
  offsetStorageTopic: source-connect-offsets
  statusStorageTopic: source-connect-status

  # ==========================================
  # Kafka Connect 설정
  # ==========================================
  config:
    # ==========================================
    # 내부 토픽 복제 설정
    # ==========================================
    config.storage.replication.factor: 1
    offset.storage.replication.factor: 1
    status.storage.replication.factor: 1

    # ==========================================
    # 외부 컨버터 설정 (스키마 활성화)
    # ==========================================
    key.converter: org.apache.kafka.connect.json.JsonConverter
    key.converter.schemas.enable: true
    value.converter: org.apache.kafka.connect.json.JsonConverter
    value.converter.schemas.enable: true

  # ==========================================
  # JVM 메모리 설정
  # ==========================================
  jvmOptions:
    -Xms: 1g
    -Xmx: 1g

  # ==========================================
  # 리소스 할당
  # ==========================================
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
